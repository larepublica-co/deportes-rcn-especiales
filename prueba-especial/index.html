<!doctype html>
<html lang="es">
	<head>
<link rel="canonical" href="https://especiales.lafm.com.co/prueba-especial/"/>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Prueba Especial</title>
		<style>
			:root {
				--bg: #f4f6fb;
				--card: #ffffff;
				--text: #1f2937;
				--muted: #6b7280;
				--accent: #2563eb;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
				color: var(--text);
			}

			.card {
				width: min(680px, 92vw);
				background: var(--card);
				border-radius: 14px;
				padding: 28px;
				box-shadow: 0 10px 30px rgba(31, 41, 55, 0.12);
			}

			h1 {
				margin: 0 0 10px;
				font-size: 1.8rem;
				color: var(--accent);
			}

			p {
				margin: 0;
				line-height: 1.7;
				color: var(--muted);
			}
		</style>
	</head>
	<body>
		<main class="card">
			<h1>Lorem Ipsum</h1>
			<p>
				Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vestibulum eu
				nisl a lorem iaculis posuere. Aliquam erat volutpat. Duis facilisis,
				justo a commodo varius, turpis urna dictum sem, vitae dapibus metus
				felis non nisl.
			</p>
		</main>
	</body>
</html>
